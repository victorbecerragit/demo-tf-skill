name: Terraform CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'modules/**'
      - 'examples/**'
      - '.github/workflows/terraform-ci.yml'
      - '*.tf'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'modules/**'
      - 'examples/**'
      - '.github/workflows/terraform-ci.yml'
      - '*.tf'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform operation to execute'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
      bucket_prefix:
        description: 'Bucket prefix for deployment'
        required: false
        default: 'demo-poc'
      environment:
        description: 'Environment tag for deployment'
        required: false
        default: 'dev'
      force_destroy:
        description: 'Force deletion of non-empty S3 buckets during destroy'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  TF_VERSION: "1.6.4"
  TFLINT_VERSION: "v0.61.0"
  AWS_REGION: "us-east-1"
  DEFAULT_TF_STATE_BUCKET: "tf-state-200227355781-us-east-1"
  DEFAULT_TF_STATE_KEY: "test-tf-skill/demo-poc/terraform.tfstate"
  DEFAULT_TF_STATE_REGION: "us-east-1"
  DEFAULT_TF_LOCK_TABLE: "terraform-locks"
  DEFAULT_BUCKET_PREFIX: "demo-poc"
  DEFAULT_DEPLOY_ENVIRONMENT: "dev"

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write
  security-events: write

jobs:
  # Stage 1: Validate & Lint
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        terraform-examples:
          - examples/minimal
          - examples/complete

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: |
          terraform fmt -check -recursive .

      - name: Terraform Validate
        working-directory: ${{ matrix.terraform-examples }}
        run: |
          terraform init -backend=false
          terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Initialize TFLint Plugins
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tflint --init
          tflint --version

      - name: Run TFLint
        working-directory: ${{ matrix.terraform-examples }}
        run: tflint --chdir . --config ${{ github.workspace }}/.tflint.hcl --format compact

  # Stage 2: Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'Trivy'

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,secrets
          quiet: false
          soft_fail: true
          output_format: sarif
          output_file_path: reports/checkov
        continue-on-error: true

      - name: Upload Checkov Results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('reports/checkov.sarif') != ''
        with:
          sarif_file: 'reports/checkov.sarif'
          category: 'Checkov'

  # Stage 3: Native Tests
  test:
    name: Native Terraform Tests
    runs-on: ubuntu-latest
    needs: validate
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Run Terraform Tests
        working-directory: modules/s3-bucket
        run: |
          terraform init -backend=false
          terraform test -verbose

  # Stage 4: Cost Estimation (Infracost)
  cost-estimation:
    name: Cost Estimation
    runs-on: ubuntu-latest
    needs: validate
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate AWS Credentials Configuration
        run: |
          if [ -z "$AWS_ROLE_ARN" ] && { [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; }; then
            echo "Either AWS_ROLE_ARN (preferred) or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets must be configured."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate Infracost API Key
        run: |
          if [ -z "${{ secrets.INFRACOST_API_KEY }}" ]; then
            echo "INFRACOST_API_KEY secret is missing."
            exit 1
          fi
          echo "INFRACOST_API_KEY is configured."

      - name: Run Infracost
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Terraform Plan for Cost Estimation
        run: |
          mkdir -p /tmp/plans

          # Plan for minimal example
          cd examples/minimal
          terraform init -backend=false
          terraform plan -out=/tmp/plans/minimal.tfplan
          terraform show -json /tmp/plans/minimal.tfplan > /tmp/plans/minimal.json
          cd ../..

          # Plan for complete example
          cd examples/complete
          terraform init -backend=false
          terraform plan -out=/tmp/plans/complete.tfplan
          terraform show -json /tmp/plans/complete.tfplan > /tmp/plans/complete.json
          cd ../..

      - name: Estimate Infracost
        run: |
          cd examples/minimal
          infracost breakdown --path /tmp/plans/minimal.json \
            --format json > /tmp/infracost-minimal.json
          cd ../..

          cd examples/complete
          infracost breakdown --path /tmp/plans/complete.json \
            --format json > /tmp/infracost-complete.json
          cd ../..

          # Display cost summary
          echo "## 💰 Cost Estimation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Minimal Example" >> $GITHUB_STEP_SUMMARY

          cd examples/minimal
          infracost breakdown --path /tmp/plans/minimal.json >> $GITHUB_STEP_SUMMARY
          cd ../..
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Complete Example" >> $GITHUB_STEP_SUMMARY

          cd examples/complete
          infracost breakdown --path /tmp/plans/complete.json >> $GITHUB_STEP_SUMMARY
          cd ../..

      - name: Save Cost Estimates
        uses: actions/upload-artifact@v4
        with:
          name: cost-estimates
          path: /tmp/infracost-*.json

  # Stage 5: Plan Generation
  plan:
    name: Generate Terraform Plan
    runs-on: ubuntu-latest
    needs: [validate, security]
    if: github.event_name == 'pull_request'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'tf-state-200227355781-us-east-1' }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'test-tf-skill/demo-poc/terraform.tfstate' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || 'us-east-1' }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'terraform-locks' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate AWS Credentials Configuration
        run: |
          if [ -z "$AWS_ROLE_ARN" ] && { [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; }; then
            echo "Either AWS_ROLE_ARN (preferred) or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets must be configured."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare Terraform Backend Configuration
        run: |
          {
            echo "bucket = \"$TF_STATE_BUCKET\""
            echo "key = \"$TF_STATE_KEY\""
            echo "region = \"$TF_STATE_REGION\""
            echo 'encrypt = true'
          } > /tmp/backend.hcl

          if [ -n "$TF_LOCK_TABLE" ]; then
            echo "dynamodb_table = \"$TF_LOCK_TABLE\"" >> /tmp/backend.hcl
          fi

      - name: Generate Plan (Complete Example)
        working-directory: examples/complete
        run: |
          if [ -f /tmp/backend.hcl ]; then
            terraform init -backend-config=/tmp/backend.hcl
          else
            terraform init -backend=false
          fi
          terraform plan -out=complete.tfplan
          terraform show -json complete.tfplan > complete-plan.json

      - name: Generate Plan (Minimal Example)
        working-directory: examples/minimal
        run: |
          if [ -f /tmp/backend.hcl ]; then
            terraform init -backend-config=/tmp/backend.hcl
          else
            terraform init -backend=false
          fi
          terraform plan -out=minimal.tfplan
          terraform show -json minimal.tfplan > minimal-plan.json

      - name: Upload Plan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plans
          path: |
            examples/*/complete.tfplan
            examples/*/minimal.tfplan
            examples/*/*-plan.json

      - name: Comment Plan Results
        if: ${{ always() && github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            let comment = '## ✅ Terraform Plan Summary\n\n';
            comment += '| Stage | Status |\n';
            comment += '|-------|--------|\n';
            comment += '| ✅ Validation | Passed |\n';
            comment += '| ✅ Security | Passed |\n';
            comment += '| ✅ Tests | Passed |\n';
            comment += '| ✅ Cost Estimation | Complete |\n';
            comment += '| ✅ Plan Generation | Complete |\n\n';
            comment += '### Next Steps\n';
            comment += '- Review this plan in detail\n';
            comment += '- Check the cost estimation artifacts\n';
            comment += '- After approval, merge to main to trigger the protected AWS deployment\n';
            comment += '- Configure required reviewers on the production environment in repository settings\n';
            comment += '- Default Terraform state values are built in and can be overridden with repository variables\n';

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              core.warning(`Skipping PR comment: ${error.message}`);
            }

  # Stage 6: Protected Apply / Destroy
  deploy:
    name: Deploy or Destroy AWS Infrastructure
    runs-on: ubuntu-latest
    needs: [validate, security, test, cost-estimation]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment: production
    concurrency:
      group: terraform-production-deploy
      cancel-in-progress: false
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'tf-state-200227355781-us-east-1' }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'test-tf-skill/demo-poc/terraform.tfstate' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || 'us-east-1' }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'terraform-locks' }}
      TF_VAR_bucket_prefix: ${{ vars.BUCKET_PREFIX || 'demo-poc' }}
      TF_VAR_environment: ${{ vars.DEPLOY_ENVIRONMENT || 'dev' }}
      TF_VAR_force_destroy: ${{ vars.FORCE_DESTROY || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate AWS Credentials Configuration
        run: |
          if [ -z "$AWS_ROLE_ARN" ] && { [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; }; then
            echo "Either AWS_ROLE_ARN (preferred) or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets must be configured."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Terraform operation
        id: resolve
        shell: bash
        run: |
          OPERATION="apply"
          BUCKET_PREFIX="${TF_VAR_bucket_prefix}"
          DEPLOY_ENV="${TF_VAR_environment}"
          FORCE_DESTROY="${TF_VAR_force_destroy:-false}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            OPERATION="${{ github.event.inputs.action }}"
            BUCKET_PREFIX="${{ github.event.inputs.bucket_prefix }}"
            DEPLOY_ENV="${{ github.event.inputs.environment }}"
            FORCE_DESTROY="${{ github.event.inputs.force_destroy }}"
          fi

          BUCKET_PREFIX="${BUCKET_PREFIX:-demo-poc}"
          DEPLOY_ENV="${DEPLOY_ENV:-dev}"
          FORCE_DESTROY="${FORCE_DESTROY:-false}"

          if [ "$OPERATION" = "destroy" ]; then
            FORCE_DESTROY="true"
          fi

          TF_STATE_KEY_EFFECTIVE="$TF_STATE_KEY"
          if [ -z "$TF_STATE_KEY_EFFECTIVE" ] || [ "$TF_STATE_KEY_EFFECTIVE" = "test-tf-skill/demo-poc/terraform.tfstate" ]; then
            TF_STATE_KEY_EFFECTIVE="test-tf-skill/${BUCKET_PREFIX}/${DEPLOY_ENV}/terraform.tfstate"
          fi

          echo "operation=$OPERATION" >> "$GITHUB_OUTPUT"
          echo "bucket_prefix=$BUCKET_PREFIX" >> "$GITHUB_OUTPUT"
          echo "deploy_environment=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "force_destroy=$FORCE_DESTROY" >> "$GITHUB_OUTPUT"
          echo "tf_state_key=$TF_STATE_KEY_EFFECTIVE" >> "$GITHUB_OUTPUT"

      - name: Prepare Terraform Backend Configuration
        run: |
          {
            echo "bucket = \"$TF_STATE_BUCKET\""
            echo "key = \"${{ steps.resolve.outputs.tf_state_key }}\""
            echo "region = \"$TF_STATE_REGION\""
            echo 'encrypt = true'
          } > /tmp/backend.hcl

          if [ -n "$TF_LOCK_TABLE" ]; then
            echo "dynamodb_table = \"$TF_LOCK_TABLE\"" >> /tmp/backend.hcl
          fi

      - name: Terraform Apply or Destroy (Complete Example)
        working-directory: examples/complete
        shell: bash
        run: |
          echo "Terraform action: ${{ steps.resolve.outputs.operation }}"
          echo "Bucket prefix: ${{ steps.resolve.outputs.bucket_prefix }}"
          echo "Environment: ${{ steps.resolve.outputs.deploy_environment }}"
          echo "State key: ${{ steps.resolve.outputs.tf_state_key }}"
          echo "Force destroy: ${{ steps.resolve.outputs.force_destroy }}"

          terraform init -reconfigure -backend-config=/tmp/backend.hcl

          if [ "${{ steps.resolve.outputs.operation }}" = "destroy" ]; then
            terraform destroy -auto-approve \
              -var="bucket_prefix=${{ steps.resolve.outputs.bucket_prefix }}" \
              -var="environment=${{ steps.resolve.outputs.deploy_environment }}" \
              -var="force_destroy=${{ steps.resolve.outputs.force_destroy }}"
          else
            terraform apply -auto-approve \
              -var="bucket_prefix=${{ steps.resolve.outputs.bucket_prefix }}" \
              -var="environment=${{ steps.resolve.outputs.deploy_environment }}" \
              -var="force_destroy=${{ steps.resolve.outputs.force_destroy }}"
          fi

      - name: Publish Deployment Summary
        working-directory: examples/complete
        shell: bash
        run: |
          echo "## 🚀 Terraform Operation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Action: ${{ steps.resolve.outputs.operation }}" >> $GITHUB_STEP_SUMMARY
          echo "- Bucket prefix: ${{ steps.resolve.outputs.bucket_prefix }}" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ steps.resolve.outputs.deploy_environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- State key: ${{ steps.resolve.outputs.tf_state_key }}" >> $GITHUB_STEP_SUMMARY
          echo "- Force destroy: ${{ steps.resolve.outputs.force_destroy }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.resolve.outputs.operation }}" = "destroy" ]; then
            echo "Infrastructure destroy completed." >> $GITHUB_STEP_SUMMARY
          else
            terraform output >> $GITHUB_STEP_SUMMARY
          fi

  # Stage 7: Validate (Summary)
  validate-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate, security, test, cost-estimation, plan, deploy]
    if: always()

    steps:
      - name: Publish Job Status
        run: |
          echo "## 🎯 Terraform CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate & Lint | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scanning | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Native Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cost Estimation | ${{ needs.cost-estimation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PR Plan | ${{ needs.plan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any required job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
